<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Customers - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 bg-dark min-vh-100">
                <div class="text-center py-4">
                    <h3 class="text-white">👔 Admin Panel</h3>
                </div>
                <div class="mt-3">
                    <a href="/admin/dashboard" class="nav-link text-white">Dashboard</a>
                    <a href="/admin/manage-customers" class="nav-link text-white active bg-primary">Manage Customers</a>
                    <a href="/admin/manage-bookings" class="nav-link text-white">Manage Bookings</a>
                    <a href="/admin/daily-reports" class="nav-link text-white">Daily Reports</a>
                    <a href="/logout" class="nav-link text-white">Logout</a>
                </div>
            </div>

            <div class="col-md-9 col-lg-10">
                <nav class="navbar navbar-light bg-light px-3 mb-4">
                    <span class="navbar-brand mb-0 h1">Customer Management</span>
                </nav>

                <div class="container">
                    <div class="card">
                        <div class="card-body">
                            <table class="table table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Total Bookings</th>
                                        <th>Registered Date</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="customer : ${customers}">
                                        <td th:text="${customer.id}">1</td>
                                        <td th:text="${customer.user.name}">John Doe</td>
                                        <td th:text="${customer.user.email}">john@example.com</td>
                                        <td th:text="${customer.totalBookings}">0</td>
                                        <td th:text="${#dates.format(customer.registeredAt, 'yyyy-MM-dd')}">2024-01-01</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
