<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard - Car Wash Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            padding-left: 30px;
        }
        .sidebar a.active {
            background: rgba(255,255,255,0.2);
            border-left: 4px solid white;
        }
        .stats-card {
            border-radius: 10px;
            padding: 20px;
            color: white;
            margin-bottom: 20px;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .stats-card:hover {
            transform: translateY(-5px);
        }
        .stats-card i {
            font-size: 2.5rem;
            opacity: 0.7;
            float: right;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <div class="text-center py-4">
                    <h3 class="text-white">🚗 Car Wash Pro</h3>
                    <p class="text-white-50">Client Portal</p>
                </div>
                <div class="mt-3">
                    <a href="/client/dashboard" class="active">
                        <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                    </a>
                    <a href="/client/book-wash">
                        <i class="fas fa-calendar-plus me-2"></i> Book Wash
                    </a>
                    <a href="/client/my-bookings">
                        <i class="fas fa-list me-2"></i> My Bookings
                    </a>
                    <a href="/client/payments">
                        <i class="fas fa-credit-card me-2"></i> Payments
                    </a>
                    <a href="/logout">
                        <i class="fas fa-sign-out-alt me-2"></i> Logout
                    </a>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10">
                <nav class="navbar navbar-light bg-light px-3 mb-4 shadow-sm">
                    <span class="navbar-brand mb-0 h1">
                        <i class="fas fa-tachometer-alt me-2 text-primary"></i>Welcome, <span sec:authentication="name"></span>!
                    </span>
                    <span class="badge bg-success">Client</span>
                </nav>

                <div class="container-fluid">
                    <!-- Statistics Cards -->
                    <div class="row">
                        <div class="col-md-4">
                            <div class="stats-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                                <i class="fas fa-calendar-check"></i>
                                <h3 th:text="${totalBookings}">0</h3>
                                <p>Total Bookings</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stats-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                                <i class="fas fa-clock"></i>
                                <h3 th:text="${pendingCount}">0</h3>
                                <p>Pending Bookings</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stats-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                                <i class="fas fa-check-circle"></i>
                                <h3 th:text="${completedCount}">0</h3>
                                <p>Completed Services</p>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Action -->
                    <div class="card shadow-sm mt-3">
                        <div class="card-body text-center">
                            <h5>Ready for a car wash?</h5>
                            <p>Book your next car wash service in just a few clicks</p>
                            <a href="/client/book-wash" class="btn btn-primary btn-lg">
                                <i class="fas fa-calendar-plus me-2"></i> Book Now
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
