<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payments - Car Wash Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            padding-left: 30px;
        }
        .sidebar a.active {
            background: rgba(255,255,255,0.2);
            border-left: 4px solid white;
        }
        .stats-card {
            border-radius: 10px;
            padding: 20px;
            color: white;
            margin-bottom: 20px;
        }
        .stats-card i {
            font-size: 3rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <div class="text-center py-4">
                    <h3 class="text-white">🚗 Car Wash Pro</h3>
                    <p class="text-white-50">Client Portal</p>
                </div>
                <div class="mt-3">
                    <a href="/client/dashboard">
                        <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                    </a>
                    <a href="/client/book-wash">
                        <i class="fas fa-calendar-plus me-2"></i> Book Wash
                    </a>
                    <a href="/client/my-bookings">
                        <i class="fas fa-list me-2"></i> My Bookings
                    </a>
                    <a href="/client/payments" class="active">
                        <i class="fas fa-credit-card me-2"></i> Payments
                    </a>
                    <a href="/logout">
                        <i class="fas fa-sign-out-alt me-2"></i> Logout
                    </a>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10">
                <nav class="navbar navbar-light bg-light px-3 mb-4">
                    <span class="navbar-brand mb-0 h1">Payments</span>
                </nav>

                <div class="container">
                    <div th:if="${param.success}" class="alert alert-success">
                        Payment completed successfully!
                    </div>

                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Pending Payments</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Booking ID</th>
                                        <th>Vehicle</th>
                                        <th>Service</th>
                                        <th>Amount</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="booking : ${bookings}" th:if="${booking.status == 'COMPLETED'}">
                                        <td th:text="${booking.id}">1</td>
                                        <td th:text="${booking.vehicleNumber}">ABC-123</td>
                                        <td th:text="${booking.serviceType}">Premium</td>
                                        <td>$<span th:text="${booking.totalAmount}">40</span></td>
                                        <td>
                                            <form action="/client/make-payment" method="post" style="display: inline;">
                                                <input type="hidden" name="bookingId" th:value="${booking.id}">
                                                <select name="paymentMethod" class="form-select form-select-sm d-inline w-auto" required>
                                                    <option value="">Select</option>
                                                    <option value="CARD">Credit Card</option>
                                                    <option value="CASH">Cash</option>
                                                    <option value="UPI">UPI</option>
                                                </select>
                                                <button type="submit" class="btn btn-sm btn-success">
                                                    <i class="fas fa-credit-card me-1"></i> Pay Now
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${bookings.isEmpty()}">
                                        <td colspan="5" class="text-center text-muted">No pending payments</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
