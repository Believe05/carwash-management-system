<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Reports - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 bg-dark min-vh-100">
                <div class="text-center py-4">
                    <h3 class="text-white">👔 Admin Panel</h3>
                </div>
                <div class="mt-3">
                    <a href="/admin/dashboard" class="nav-link text-white">Dashboard</a>
                    <a href="/admin/manage-customers" class="nav-link text-white">Manage Customers</a>
                    <a href="/admin/manage-bookings" class="nav-link text-white">Manage Bookings</a>
                    <a href="/admin/daily-reports" class="nav-link text-white active bg-primary">Daily Reports</a>
                    <a href="/logout" class="nav-link text-white">Logout</a>
                </div>
            </div>

            <div class="col-md-9 col-lg-10">
                <nav class="navbar navbar-light bg-light px-3 mb-4">
                    <span class="navbar-brand mb-0 h1">Daily Reports</span>
                </nav>

                <div class="container">
                    <div class="card mb-4">
                        <div class="card-body">
                            <form method="get" class="row">
                                <div class="col-md-6">
                                    <label>Select Date</label>
                                    <input type="date" name="date" th:value="${selectedDate}" class="form-control">
                                </div>
                                <div class="col-md-6 align-self-end">
                                    <button type="submit" class="btn btn-primary">Generate Report</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div th:if="${report}" class="card">
                        <div class="card-header bg-success text-white">
                            <h5>Report for <span th:text="${#dates.format(report.date, 'yyyy-MM-dd')}"></span></h5>
                        </div>
                        <div class="card-body">
                            <div class="row mb-4">
                                <div class="col-md-3">
                                    <div class="alert alert-info">
                                        <strong>Total Bookings</strong>
                                        <h3 th:text="${report.totalBookings}">0</h3>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="alert alert-success">
                                        <strong>Completed</strong>
                                        <h3 th:text="${report.completedBookings}">0</h3>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="alert alert-warning">
                                        <strong>Pending</strong>
                                        <h3 th:text="${report.pendingBookings}">0</h3>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="alert alert-primary">
                                        <strong>Revenue</strong>
                                        <h3>$<span th:text="${report.totalRevenue}">0</span></h3>
                                    </div>
                                </div>
                            </div>

                            <h6>Booking Details:</h6>
                            <table class="table table-sm">
                                <thead>
                                    <tr>
                                        <th>Time</th>
                                        <th>Vehicle</th>
                                        <th>Service</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="booking : ${report.bookings}">
                                        <td th:text="${#dates.format(booking.createdAt, 'HH:mm')}">10:30</td>
                                        <td th:text="${booking.vehicleNumber}">ABC-123</td>
                                        <td th:text="${booking.serviceType}">Premium</td>
                                        <td>$<span th:text="${booking.totalAmount}">40</span></td>
                                        <td th:text="${booking.status}">Completed</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
