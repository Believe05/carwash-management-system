<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Bookings - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 bg-dark min-vh-100">
                <div class="text-center py-4">
                    <h3 class="text-white">👔 Admin Panel</h3>
                </div>
                <div class="mt-3">
                    <a href="/admin/dashboard" class="nav-link text-white">Dashboard</a>
                    <a href="/admin/manage-customers" class="nav-link text-white">Manage Customers</a>
                    <a href="/admin/manage-bookings" class="nav-link text-white active bg-primary">Manage Bookings</a>
                    <a href="/admin/daily-reports" class="nav-link text-white">Daily Reports</a>
                    <a href="/logout" class="nav-link text-white">Logout</a>
                </div>
            </div>

            <div class="col-md-9 col-lg-10">
                <nav class="navbar navbar-light bg-light px-3 mb-4">
                    <span class="navbar-brand mb-0 h1">Booking Management</span>
                </nav>

                <div class="container">
                    <div class="card">
                        <div class="card-body">
                            <table class="table table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Customer</th>
                                        <th>Vehicle</th>
                                        <th>Service</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="booking : ${bookings}">
                                        <td th:text="${booking.id}">1</td>
                                        <td th:text="${booking.customer.user.name}">John Doe</td>
                                        <td>
                                            <strong th:text="${booking.vehicleNumber}"></strong><br>
                                            <small th:text="${booking.vehicleModel}" class="text-muted"></small>
                                        </td>
                                        <td th:text="${booking.serviceType}">Premium</td>
                                        <td>$<span th:text="${booking.totalAmount}">40</span></td>
                                        <td>
                                            <span th:if="${booking.status == 'PENDING'}" class="badge bg-warning">Pending</span>
                                            <span th:if="${booking.status == 'APPROVED'}" class="badge bg-info">Approved</span>
                                            <span th:if="${booking.status == 'COMPLETED'}" class="badge bg-success">Completed</span>
                                            <span th:if="${booking.status == 'REJECTED'}" class="badge bg-danger">Rejected</span>
                                        </td>
                                        <td>
                                            <form th:if="${booking.status == 'PENDING'}" 
                                                  th:action="@{|/admin/approve-booking/${booking.id}|}" 
                                                  method="post" style="display: inline;">
                                                <button type="submit" class="btn btn-sm btn-success">
                                                    <i class="fas fa-check"></i> Approve
                                                </button>
                                            </form>
                                            <form th:if="${booking.status == 'PENDING'}" 
                                                  th:action="@{|/admin/reject-booking/${booking.id}|}" 
                                                  method="post" style="display: inline;">
                                                <button type="submit" class="btn btn-sm btn-danger">
                                                    <i class="fas fa-times"></i> Reject
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
