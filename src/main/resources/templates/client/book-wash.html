<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Car Wash - Car Wash Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            padding-left: 30px;
        }
        .sidebar a.active {
            background: rgba(255,255,255,0.2);
            border-left: 4px solid white;
        }
        .price-display {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <div class="text-center py-4">
                    <h3 class="text-white">🚗 Car Wash Pro</h3>
                    <p class="text-white-50">Client Portal</p>
                </div>
                <div class="mt-3">
                    <a href="/client/dashboard">
                        <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                    </a>
                    <a href="/client/book-wash" class="active">
                        <i class="fas fa-calendar-plus me-2"></i> Book Wash
                    </a>
                    <a href="/client/my-bookings">
                        <i class="fas fa-list me-2"></i> My Bookings
                    </a>
                    <a href="/client/payments">
                        <i class="fas fa-credit-card me-2"></i> Payments
                    </a>
                    <a href="/logout">
                        <i class="fas fa-sign-out-alt me-2"></i> Logout
                    </a>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10">
                <nav class="navbar navbar-light bg-light px-3 mb-4 shadow-sm">
                    <span class="navbar-brand mb-0 h1">Book a Car Wash</span>
                </nav>

                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-md-8">
                            <div class="card shadow">
                                <div class="card-header bg-primary text-white">
                                    <h4 class="mb-0"><i class="fas fa-calendar-plus me-2"></i> New Booking Request</h4>
                                </div>
                                <div class="card-body">
                                    <form action="/client/book-wash" method="post">
                                        <div class="mb-3">
                                            <label for="vehicleNumber" class="form-label">Vehicle Number *</label>
                                            <input type="text" class="form-control" id="vehicleNumber" name="vehicleNumber" 
                                                   placeholder="e.g., ABC-1234" required>
                                        </div>

                                        <div class="mb-3">
                                            <label for="vehicleModel" class="form-label">Vehicle Model *</label>
                                            <input type="text" class="form-control" id="vehicleModel" name="vehicleModel" 
                                                   placeholder="e.g., Toyota Camry 2022" required>
                                        </div>

                                        <div class="mb-3">
                                            <label for="serviceType" class="form-label">Service Type *</label>
                                            <select class="form-select" id="serviceType" name="serviceType" required>
                                                <option value="">Select Service...</option>
                                                <option value="Basic">🚗 Basic Wash - R500</option>
                                                <option value="Premium">✨ Premium Wash - R1000</option>
                                                <option value="Deluxe">💎 Deluxe Package - R1500</option>
                                            </select>
                                        </div>

                                        <div class="alert alert-info">
                                            <h6><i class="fas fa-info-circle me-2"></i> Service Includes:</h6>
                                            <ul id="serviceInfo">
                                                <li>Basic: Exterior wash, tire cleaning, drying</li>
                                            </ul>
                                        </div>

                                        <div class="alert alert-warning" id="discountAlert" style="display: none;">
                                            <i class="fas fa-gem me-2"></i>
                                            <strong>Loyalty Discount Applied!</strong> 
                                            <span id="discountText"></span>
                                        </div>

                                        <button type="submit" class="btn btn-primary w-100 py-2">
                                            <i class="fas fa-check-circle me-2"></i> Submit Booking
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const servicePrices = {
            'Basic': 500,
            'Premium': 1000,
            'Deluxe': 1500
        };
        
        const serviceInfo = {
            'Basic': 'Exterior wash, tire cleaning, hand drying',
            'Premium': 'Exterior + interior cleaning, waxing, vacuuming',
            'Deluxe': 'Complete detailing, engine cleaning, ceramic coating'
        };
        
        document.getElementById('serviceType').addEventListener('change', function() {
            const service = this.value;
            const infoList = document.getElementById('serviceInfo');
            if (service && serviceInfo[service]) {
                infoList.innerHTML = `<li><i class="fas fa-check-circle me-2"></i> ${serviceInfo[service]}</li>`;
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
