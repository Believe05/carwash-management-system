<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Bookings - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar a { color: white; text-decoration: none; padding: 12px 20px; display: block; transition: all 0.3s; }
        .sidebar a:hover { background: #34495e; padding-left: 30px; }
        .sidebar a.active { background: #3498db; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <div class="text-center py-4">
                    <h3 class="text-white">👔 Admin Panel</h3>
                </div>
                <div class="mt-3">
                    <a href="/admin/dashboard"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                    <a href="/admin/manage-customers"><i class="fas fa-users me-2"></i> Manage Customers</a>
                    <a href="/admin/manage-bookings" class="active"><i class="fas fa-calendar-check me-2"></i> Manage Bookings</a>
                    <a href="/admin/daily-reports"><i class="fas fa-chart-line me-2"></i> Daily Reports</a>
                    <a href="/admin/loyalty"><i class="fas fa-gem me-2"></i> Loyalty Program</a>
                    <a href="/admin/analytics"><i class="fas fa-chart-pie me-2"></i> Analytics</a>
                    <a href="/logout"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
                </div>
            </div>

            <div class="col-md-9 col-lg-10">
                <nav class="navbar navbar-light bg-light px-3 mb-4">
                    <span class="navbar-brand mb-0 h1">Booking Management</span>
                </nav>

                <div class="container">
                    <div class="card">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>ID</th>
                                            <th>Customer</th>
                                            <th>Vehicle</th>
                                            <th>Service</th>
                                            <th>Amount</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="booking : ${bookings}">
                                            <td th:text="${booking.id}">1</td>
                                            <td th:text="${booking.customer.user.name}">John Doe</td>
                                            <td>
                                                <strong th:text="${booking.vehicleNumber}"></strong><br>
                                                <small th:text="${booking.vehicleModel}" class="text-muted"></small>
                                            </td>
                                            <td th:text="${booking.serviceType}">Premium</td>
                                            <td>R<span th:text="${booking.totalAmount}">0</span></td>
                                            <td>
                                                <span th:if="${booking.status == 'PENDING'}" class="badge bg-warning">⏳ Pending</span>
                                                <span th:if="${booking.status == 'APPROVED'}" class="badge bg-info">✓ Approved</span>
                                                <span th:if="${booking.status == 'COMPLETED'}" class="badge bg-success">✅ Completed</span>
                                                <span th:if="${booking.status == 'REJECTED'}" class="badge bg-danger">✗ Rejected</span>
                                            </td>
                                            <td>
                                                <div class="btn-group btn-group-sm">
                                                    <form th:if="${booking.status == 'PENDING'}" th:action="@{|/admin/approve-booking/${booking.id}|}" method="post" style="display: inline;">
                                                        <button type="submit" class="btn btn-sm btn-success"><i class="fas fa-check"></i> Approve</button>
                                                    </form>
                                                    <form th:if="${booking.status == 'APPROVED'}" th:action="@{|/admin/complete-booking/${booking.id}|}" method="post" style="display: inline;">
                                                        <button type="submit" class="btn btn-sm btn-info"><i class="fas fa-check-double"></i> Complete</button>
                                                    </form>
                                                    <form th:if="${booking.status == 'PENDING'}" th:action="@{|/admin/reject-booking/${booking.id}|}" method="post" style="display: inline;">
                                                        <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-times"></i> Reject</button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr th:if="${bookings.isEmpty()}">
                                            <td colspan="7" class="text-center text-muted">No bookings found</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
